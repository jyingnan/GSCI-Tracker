name: GSCI Weekly Auto-Update

on:
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday at 00:00 UTC
  workflow_dispatch: # Allows manual trigger for testing

# Explicitly grant write permissions to the bot
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas google-cloud-bigquery db-dtypes

      - name: Execute Update Script
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: python update_gsci.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GSCI-Bot"
          git config --global user.email "bot@gsci-research.org"
          git add gsci_data.csv
          # Only commit if there are changes to avoid error 128
          if git diff --staged --quiet; then
            echo "No changes to commit"
            # 强制空提交保持活跃，防止GitHub休眠cron
            git commit --allow-empty -m "Keep-alive: $(date)"
          else
            git commit -m "Automated Data Update: $(date)"
            git push
          fi
